<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>FNK0043 Control</title>
  <link rel="stylesheet" href="/assets/style.css?v=4" />
</head>
<body>
  <header>
    <h1>FNK0043 Smart Car</h1>
    <div id="status-bar">
      <span id="conn-status" class="badge offline">Connecting...</span>
      <span id="battery" class="badge">-- V</span>
      <span id="mock-badge" class="badge hidden">Mock</span>
    </div>
  </header>

  <main>
    <section class="panel video-panel">
      <div class="camera-toolbar">
        <span>Live camera</span>
        <button id="camera-reload" type="button">Reload feed</button>
      </div>
      <img id="camera" src="/stream" alt="Camera feed" />
      <div class="sensor-grid">
        <div class="sensor"><label>Distance</label><span id="distance">--</span></div>
        <div class="sensor"><label>Light L/R</label><span id="light">-- / --</span></div>
        <div class="sensor"><label>Line L/C/R</label><span id="line">--</span></div>
      </div>
    </section>

    <section class="panel controls-panel">
      <h2>Drive</h2>
      <div class="dpad">
        <button data-dir="forward" class="dpad-btn">Fwd</button>
        <button data-dir="left" class="dpad-btn">Left</button>
        <button data-dir="stop" class="dpad-btn stop">Stop</button>
        <button data-dir="right" class="dpad-btn">Right</button>
        <button data-dir="backward" class="dpad-btn">Back</button>
      </div>

      <label class="speed-label">
        Speed
        <input type="range" id="speed" min="0.2" max="1" step="0.05" value="0.6" />
      </label>

      <h2>Autonomous</h2>
      <div class="mode-buttons">
        <button data-mode="manual" class="mode active">Manual</button>
        <button data-mode="light_follow">Light</button>
        <button data-mode="line_follow">Line</button>
        <button data-mode="obstacle_avoid">Ultrasonic</button>
      </div>

      <h2>Camera</h2>

      <p class="camera-axis-label">Pan (left / right)</p>
      <div class="pan-controls">
        <button type="button" class="pan-btn" data-pan="30">Left</button>
        <button type="button" class="pan-btn" data-pan="90">Center</button>
        <button type="button" class="pan-btn" data-pan="150">Right</button>
        <span id="pan-angle" class="pan-angle">90 deg</span>
      </div>
      <label class="pan-slider">
        Pan fine
        <input type="range" id="servo-pan" min="30" max="150" step="1" value="90" />
      </label>

      <p class="camera-axis-label">Tilt (up / down)</p>
      <div class="pan-controls">
        <button type="button" class="tilt-btn" data-tilt="150">Up</button>
        <button type="button" class="tilt-btn" data-tilt="90">Level</button>
        <button type="button" class="tilt-btn" data-tilt="30">Down</button>
        <span id="tilt-angle" class="pan-angle">90 deg</span>
      </div>
      <label class="pan-slider">
        Tilt fine
        <input type="range" id="servo-tilt" min="30" max="150" step="1" value="90" />
      </label>

      <h2>Extras</h2>
      <div class="extras">
        <button id="buzzer" class="toggle" type="button">Buzzer</button>
      </div>
    </section>
  </main>

  <script src="/assets/app.js?v=4"></script>
</body>
</html>
